<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded black background -->
  <rect width="512" height="512" rx="108" fill="#000"/>

  <!-- Dot (the i-style tittle, sitting up-left of the T) -->
  <circle cx="167" cy="207" r="40" fill="#fff"/>

  <!-- T-shaped mark: thick horizontal bar + thick vertical stem on the right -->
  <!-- horizontal bar -->
  <rect x="232" y="167" width="160" height="80" fill="#fff"/>
  <!-- vertical stem (anchored to the right end of the bar) -->
  <rect x="312" y="167" width="80" height="184" fill="#fff"/>
</svg>
