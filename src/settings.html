<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typelessless - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div id="toast-container"></div>
  <div id="app">
    <h1>Settings</h1>

    <section>
      <label for="audio-device">Audio Input Device</label>
      <select id="audio-device">
        <option value="default">Default</option>
      </select>
    </section>

    <section>
      <label for="api-key">Doubao API Key (ARK_API_KEY)</label>
      <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      <div class="hint">Get a key from the Volcengine ARK console.</div>
    </section>

    <section>
      <label for="model">Doubao Model</label>
      <select id="model">
        <option value="doubao-seed-2-0-lite-260428" selected>doubao-seed-2-0-lite-260428</option>
        <option value="doubao-seed-2-0-mini-260428">doubao-seed-2-0-mini-260428</option>
      </select>
    </section>

    <section>
      <label for="language">Language</label>
      <select id="language">
        <option value="auto">Auto-detect</option>
        <option value="zh">Chinese</option>
        <option value="en">English</option>
        <option value="fr">French</option>
      </select>
    </section>

    <section>
      <label for="system-prompt">System Prompt</label>
      <textarea id="system-prompt" rows="8" placeholder="System prompt sent to Doubao..."></textarea>
      <div class="hint">
        Controls how Doubao transcribes and polishes your audio. Leave blank to use the built-in default.
        <button type="button" id="system-prompt-reset" class="link-btn">Reset to default</button>
      </div>
    </section>

    <section id="shortcut-section">
      <label>Shortcut</label>
      <div class="shortcut-row">
        <input type="text" id="shortcut-display" readonly value="Alt + Space">
        <button id="shortcut-assign-btn" type="button">Assign</button>
        <button id="shortcut-default-btn" type="button">Default</button>
      </div>
      <div id="shortcut-error" class="shortcut-error"></div>
    </section>

    <section>
      <button id="save-btn">Save Settings</button>
    </section>
  </div>
  <script src="settings.js"></script>
</body>
</html>
