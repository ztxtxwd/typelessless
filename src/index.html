<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typelessless</title>
  <link rel="stylesheet" href="recorder.css">
</head>
<body>
  <div id="overlay">
    <div id="progress-bg"></div>
    <div id="content">
      <button id="cancel-btn" class="pill-btn" title="Cancel (Esc)" aria-label="Cancel">
        <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 3 L13 13 M13 3 L3 13"/>
        </svg>
      </button>
      <div id="center-area">
        <canvas id="waveform" width="100" height="22"></canvas>
        <div id="loading-spinner" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <button id="confirm-btn" class="pill-btn confirm" title="Confirm" aria-label="Confirm">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8 L7 12 L13 4"/>
        </svg>
      </button>
      <div id="thinking-label" class="hidden">Thinking</div>
    </div>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
