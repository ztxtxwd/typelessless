name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python - <<'PY'
from pathlib import Path
for line in Path('src-tauri/Cargo.toml').read_text().splitlines():
    if line.startswith('version = '):
        print(line.split('"')[1])
        break
PY
)
          TAURI_VERSION=$(python - <<'PY'
import json
from pathlib import Path
print(json.loads(Path('src-tauri/tauri.conf.json').read_text())['version'])
PY
)

          test "$TAG_VERSION" = "$CARGO_VERSION"
          test "$TAG_VERSION" = "$TAURI_VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libasound2-dev libxdo-dev build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Run clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-macos:
    runs-on: macos-14
    needs: validate
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python - <<'PY'
from pathlib import Path
for line in Path('src-tauri/Cargo.toml').read_text().splitlines():
    if line.startswith('version = '):
        print(line.split('"')[1])
        break
PY
)
          TAURI_VERSION=$(python - <<'PY'
import json
from pathlib import Path
print(json.loads(Path('src-tauri/tauri.conf.json').read_text())['version'])
PY
)

          test "$TAG_VERSION" = "$CARGO_VERSION"
          test "$TAG_VERSION" = "$TAURI_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Typelessless ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  build-linux:
    runs-on: ubuntu-22.04
    needs: validate
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python - <<'PY'
from pathlib import Path
for line in Path('src-tauri/Cargo.toml').read_text().splitlines():
    if line.startswith('version = '):
        print(line.split('"')[1])
        break
PY
)
          TAURI_VERSION=$(python - <<'PY'
import json
from pathlib import Path
print(json.loads(Path('src-tauri/tauri.conf.json').read_text())['version'])
PY
)

          test "$TAG_VERSION" = "$CARGO_VERSION"
          test "$TAG_VERSION" = "$TAURI_VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libasound2-dev libxdo-dev build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Typelessless ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest
    needs: validate
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python - <<'PY'
from pathlib import Path
for line in Path('src-tauri/Cargo.toml').read_text().splitlines():
    if line.startswith('version = '):
        print(line.split('"')[1])
        break
PY
)
          TAURI_VERSION=$(python - <<'PY'
import json
from pathlib import Path
print(json.loads(Path('src-tauri/tauri.conf.json').read_text())['version'])
PY
)

          test "$TAG_VERSION" = "$CARGO_VERSION"
          test "$TAG_VERSION" = "$TAURI_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Typelessless ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
